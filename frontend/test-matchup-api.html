<!DOCTYPE html>
<html>
<head>
    <title>Matchup API Diagnostic Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #333; background: #0a0a0a; }
        .pass { color: #00ff00; }
        .fail { color: #ff0000; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
        pre { background: #000; padding: 10px; overflow-x: auto; }
        .step { margin: 10px 0; padding: 10px; border-left: 3px solid #666; }
    </style>
</head>
<body>
    <h1>🔬 AI Matchup Analyzer - Complete Diagnostic Test</h1>

    <div class="test">
        <h2>Configuration</h2>
        <div id="config"></div>
    </div>

    <div class="test">
        <h2>Test Results</h2>
        <button onclick="runAllTests()">▶️ Run All Diagnostic Tests</button>
        <div id="results"></div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://rcqoycoupygtrcnzrysf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjcW95Y291cHlndHJjbnpyeXNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA0MDkyMDEsImV4cCI6MjA3NTk4NTIwMX0.PIFxQZL8R6ZkklsmP_3zd5wCKsnTDs6IKKJR_OlvH44';
        const GEMINI_API_KEY = 'AIzaSyC7anTu4GjvAI5Ka4vEITbXNZ9M0fvJ6Z4';

        // Display config
        document.getElementById('config').innerHTML = `
            <div><strong>Supabase URL:</strong> ${SUPABASE_URL}</div>
            <div><strong>Anon Key:</strong> ${SUPABASE_ANON_KEY.substring(0, 30)}...</div>
            <div><strong>Gemini Key:</strong> ${GEMINI_API_KEY.substring(0, 20)}...</div>
        `;

        let testResults = [];

        function log(message, isError = false) {
            console.log(message);
            const color = isError ? '#ff0000' : '#00ff00';
            testResults.push(`<div style="color: ${color}">${message}</div>`);
            document.getElementById('results').innerHTML = testResults.join('');
        }

        async function test1_GeminiAPI() {
            log('═══════════════════════════════════════');
            log('TEST 1: Gemini API Direct Test');
            log('═══════════════════════════════════════');

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: 'Test' }] }]
                        })
                    }
                );

                const data = await response.json();
                if (response.ok && data.candidates) {
                    log('✅ PASS: Gemini API is accessible and working');
                    return true;
                } else {
                    log('❌ FAIL: Gemini API returned error', true);
                    log(`Response: ${JSON.stringify(data)}`, true);
                    return false;
                }
            } catch (error) {
                log(`❌ FAIL: ${error.message}`, true);
                return false;
            }
        }

        async function test2_DatabaseAccess() {
            log('');
            log('═══════════════════════════════════════');
            log('TEST 2: Database Player Query');
            log('═══════════════════════════════════════');

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/players?select=id,first_name,last_name&limit=2`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                const data = await response.json();
                if (response.ok && data.length > 0) {
                    log('✅ PASS: Database accessible, found players:');
                    data.forEach(p => log(`   - ${p.first_name} ${p.last_name} (${p.id})`));
                    return data;
                } else {
                    log('❌ FAIL: No players found or database error', true);
                    return null;
                }
            } catch (error) {
                log(`❌ FAIL: ${error.message}`, true);
                return null;
            }
        }

        async function test3_EdgeFunctionNoAuth() {
            log('');
            log('═══════════════════════════════════════');
            log('TEST 3: Edge Function (No Auth)');
            log('═══════════════════════════════════════');

            const testPlayerIds = ['e2d72bd7-a3a4-4781-8e3d-3a12dca97fd1', 'cc7b20a6-2bc2-421a-af80-09308148693c'];

            try {
                const requestBody = {
                    playerAId: testPlayerIds[0],
                    playerBId: testPlayerIds[1],
                    surface: 'Hard',
                    geminiApiKey: GEMINI_API_KEY
                };

                log('Sending request...');
                log(`Body: ${JSON.stringify(requestBody, null, 2)}`);

                const response = await fetch(
                    `${SUPABASE_URL}/functions/v1/matchup-prediction`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY
                        },
                        body: JSON.stringify(requestBody)
                    }
                );

                log(`Response Status: ${response.status} ${response.statusText}`);

                const data = await response.json();
                log(`Response Body: ${JSON.stringify(data, null, 2)}`);

                if (response.status === 401) {
                    log('⚠️  INFO: Function requires authentication (401)');
                    return { requiresAuth: true };
                } else if (response.ok && data.success) {
                    log('✅ PASS: Edge Function works without auth!');
                    return data;
                } else {
                    log(`❌ FAIL: Edge Function error - ${data.error || 'Unknown'}`, true);
                    if (data.details) log(`Details: ${data.details}`, true);
                    return data;
                }
            } catch (error) {
                log(`❌ FAIL: ${error.message}`, true);
                return null;
            }
        }

        async function test4_SupabaseAuth() {
            log('');
            log('═══════════════════════════════════════');
            log('TEST 4: Authentication Check');
            log('═══════════════════════════════════════');

            try {
                // Import Supabase client
                const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
                const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                const { data: { session } } = await supabase.auth.getSession();

                if (session) {
                    log('✅ User is authenticated');
                    log(`User ID: ${session.user.id}`);
                    log(`Token present: Yes`);
                    return session;
                } else {
                    log('⚠️  User is NOT authenticated');
                    log('This might be why the Edge Function fails if JWT verification is enabled');
                    return null;
                }
            } catch (error) {
                log(`❌ FAIL: ${error.message}`, true);
                return null;
            }
        }

        async function test5_EdgeFunctionWithAuth() {
            log('');
            log('═══════════════════════════════════════');
            log('TEST 5: Edge Function (With Auth Token)');
            log('═══════════════════════════════════════');

            try {
                const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
                const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data: { session } } = await supabase.auth.getSession();

                if (!session) {
                    log('⚠️  SKIP: Cannot test - user not authenticated');
                    log('Please log in to the app first, then re-run this test');
                    return null;
                }

                const testPlayerIds = ['e2d72bd7-a3a4-4781-8e3d-3a12dca97fd1', 'cc7b20a6-2bc2-421a-af80-09308148693c'];

                const requestBody = {
                    playerAId: testPlayerIds[0],
                    playerBId: testPlayerIds[1],
                    surface: 'Hard',
                    geminiApiKey: GEMINI_API_KEY
                };

                log('Sending authenticated request...');

                const response = await fetch(
                    `${SUPABASE_URL}/functions/v1/matchup-prediction`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${session.access_token}`,
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY
                        },
                        body: JSON.stringify(requestBody)
                    }
                );

                log(`Response Status: ${response.status} ${response.statusText}`);

                const data = await response.json();
                log(`Response Body: ${JSON.stringify(data, null, 2)}`);

                if (response.ok && data.success) {
                    log('✅ PASS: Edge Function works with authentication!');
                    log(`Prediction: ${data.prediction}`);
                    return data;
                } else {
                    log(`❌ FAIL: ${data.error || 'Unknown error'}`, true);
                    if (data.details) log(`Details: ${data.details}`, true);
                    return data;
                }
            } catch (error) {
                log(`❌ FAIL: ${error.message}`, true);
                return null;
            }
        }

        window.runAllTests = async function() {
            testResults = [];
            log('🔬 STARTING COMPREHENSIVE DIAGNOSTIC');
            log('');

            await test1_GeminiAPI();
            const players = await test2_DatabaseAccess();
            await test3_EdgeFunctionNoAuth();
            await test4_SupabaseAuth();
            await test5_EdgeFunctionWithAuth();

            log('');
            log('═══════════════════════════════════════');
            log('🏁 DIAGNOSTIC COMPLETE');
            log('═══════════════════════════════════════');
            log('Check results above to identify the issue');
        };

        // Auto-run on load
        setTimeout(() => runAllTests(), 500);
    </script>
</body>
</html>
