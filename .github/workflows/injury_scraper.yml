name: Injury Intel Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-injury-bot]

permissions:
  contents: read

jobs:
  scrape:
    name: Run Injury Intel Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Injury Scraper (single scan)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
        run: |
          python injury_scraper.py --once
