name: 🔮 Tournament Oracle Scraper

on:
  schedule:
    - cron: '0 */8 * * *'  # Runs every 8 hours
  workflow_dispatch:
  repository_dispatch:      # Ermöglicht verzögerungsfreies Triggern über Webhook
    types: [trigger-oracle]

jobs:
  run-oracle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase playwright beautifulsoup4 httpx

      - name: 🌐 Install Playwright Browsers
        run: |
          playwright install chromium

      - name: 🔮 Run Oracle Scraper
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} 
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }} 
          SUPABASE_FUNCTION_URL: ${{ secrets.FUNCTION_URL }} 
        run: |
          python oracle_scraper.py
